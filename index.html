<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운행 보고서 - 최종 점검본</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f0f2f5; line-height: 1.6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .section { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .title { font-weight: bold; color: #1a73e8; margin-bottom: 10px; display: block; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        /* 잠금 스타일 */
        .lock-visual { opacity: 0.3 !important; pointer-events: none !important; filter: grayscale(1) !important; background-color: #eee !important; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center;">📋 업무 보고서</h2>

    <div class="section">
        <span class="title">3. 업무 및 차량 선택</span>
        <div class="btn-grid" id="workTypeContainer">
            <button class="btn active" onclick="SUPER_CLICK(this, '운행')">운행</button>
            <button class="btn" onclick="SUPER_CLICK(this, '동승')">동승</button>
            <button class="btn" onclick="SUPER_CLICK(this, '내근')">내근</button>
        </div>
        <div id="carSelectionArea" style="margin-top:10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <script>for(let i=801;i<=804;i++) document.write(`<button class="btn car-btn" onclick="SELECT_CAR(this)">gs${i}</button>`);</script>
        </div>
    </div>

    <div id="BLOCK_TARGET">
        <div class="section">
            <span class="title">5. SSD 버전</span>
            <input type="text" id="input_ssd" class="clear-target" placeholder="내용 입력">
        </div>
        <div class="section">
            <span class="title">6. 자율 주행 데이터</span>
            <input type="number" id="input_dist" class="clear-target" placeholder="0">
        </div>
        <div class="section">
            <span class="title">9. 테이크오버 카운트</span>
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span>시스템 이상</span>
                <input type="number" class="clear-target" value="0" style="width: 60px; text-align: center;">
            </div>
        </div>
    </div>

    <div class="section">
        <span class="title">11. 기타 이슈</span>
        <textarea rows="3" placeholder="이슈 입력"></textarea>
    </div>

    <button onclick="alert('제출 완료')" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold;">기록하기</button>
</div>

<script>
    // [전역 함수 - 절대 덮어씌워지지 않게 고유한 이름 사용]
    function SUPER_CLICK(element, type) {
        const buttons = document.querySelectorAll('#workTypeContainer .btn');
        const targetArea = document.getElementById('BLOCK_TARGET');
        const carArea = document.getElementById('carSelectionArea');

        // 1. 동승/내근 클릭 시
        if (type === '동승' || type === '내근') {
            if (confirm("⚠️ 경고!\n\n동승/내근 선택 시 5~10번 항목이 초기화되고 잠깁니다. 진행할까요?")) {
                
                // 버튼 상태 변경
                buttons.forEach(b => b.classList.remove('active'));
                element.classList.add('active');

                // 데이터 초기화
                const inputs = document.querySelectorAll('.clear-target');
                inputs.forEach(i => {
                    if(i.type === 'number') i.value = 0;
                    else i.value = "";
                });

                // 차량 선택 해제
                document.querySelectorAll('.car-btn').forEach(c => c.classList.remove('active'));

                // 강제 잠금 (인라인 스타일 주입)
                targetArea.classList.add('lock-visual');
                carArea.classList.add('lock-visual');
                
                console.log(type + " 모드 활성화: 잠금 완료");
            }
        } 
        // 2. 운행 클릭 시
        else {
            buttons.forEach(b => b.classList.remove('active'));
            element.classList.add('active');

            // 잠금 해제
            targetArea.classList.remove('lock-visual');
            carArea.classList.remove('lock-visual');
            
            console.log("운행 모드 활성화: 잠금 해제");
        }
    }

    function SELECT_CAR(btn) {
        document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
